<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f0f0; height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* AUTH */
    #auth-screen { background: #fff; border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .icon { width: 64px; height: 64px; background: #00B900; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .auth-logo .icon svg { width: 36px; height: 36px; fill: #fff; }
    .auth-logo h1 { font-size: 22px; font-weight: 700; color: #111; }
    .auth-logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s; }
    .auth-tab.active { color: #00B900; border-bottom-color: #00B900; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-form input { padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
    .auth-form input:focus { border-color: #00B900; }
    .input-hint { font-size: 11px; color: #aaa; margin-top: -6px; padding-left: 4px; }
    .auth-form button { padding: 13px; background: #00B900; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
    .auth-form button:hover { background: #009900; }
    .auth-form button:disabled { background: #aaa; cursor: default; }
    .auth-error { font-size: 13px; color: #e24b4a; text-align: center; min-height: 16px; }

    /* APP */
    #app { display: none; width: 100vw; height: 100vh; }
    .layout { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { width: 300px; min-width: 220px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; }
    .sidebar-header { padding: 14px 16px; background: #00B900; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h2 { color: #fff; font-size: 18px; font-weight: 700; }
    .my-name { color: rgba(255,255,255,0.85); font-size: 12px; margin-top: 2px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .search-box { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    .search-box input { width: 100%; padding: 8px 12px; background: #f5f5f5; border: none; border-radius: 20px; font-size: 13px; outline: none; }
    .contacts { flex: 1; overflow-y: auto; }
    .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid #f5f5f5; }
    .contact-item:hover { background: #f8f8f8; }
    .contact-item.active { background: #e8f5e8; }
    .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 600; color: #111; }
    .contact-preview { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-time { font-size: 11px; color: #bbb; flex-shrink: 0; align-self: flex-start; padding-top: 3px; }
    .empty-sidebar { text-align: center; padding: 40px 16px; color: #bbb; font-size: 13px; line-height: 1.7; }

    /* Chat */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #f0f0f0; overflow: hidden; }
    .chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    .chat-placeholder svg { width: 60px; height: 60px; fill: #ccc; }
    .chat-placeholder p { font-size: 14px; color: #bbb; }
    #chat-window { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; }
    .chat-header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); flex-shrink: 0; }
    .chat-partner-name { font-size: 16px; font-weight: 700; color: #111; }
    .messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
    .msg-row.mine .msg-avatar { display: none; }
    .msg-bubble { max-width: 65%; padding: 9px 13px; border-radius: 18px; font-size: 14px; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
    .msg-row.theirs .msg-bubble { background: #fff; color: #111; border-bottom-left-radius: 4px; }
    .msg-row.mine .msg-bubble { background: #00B900; color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: #bbb; white-space: nowrap; padding-bottom: 1px; }
    .msg-name { font-size: 11px; color: #888; margin-bottom: 3px; padding-left: 2px; }
    .date-divider { text-align: center; font-size: 11px; color: #bbb; margin: 10px 0; display: flex; align-items: center; gap: 8px; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
    .input-area { background: #fff; border-top: 1px solid #e8e8e8; padding: 10px 12px; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .input-area textarea { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 22px; padding: 10px 16px; font-size: 14px; resize: none; outline: none; font-family: inherit; line-height: 1.4; max-height: 120px; overflow-y: auto; transition: border-color 0.2s; }
    .input-area textarea:focus { border-color: #00B900; }
    .send-btn { width: 44px; height: 44px; background: #00B900; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
    .send-btn:hover { background: #009900; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    @media (max-width: 580px) {
      .sidebar { width: 68px; min-width: 68px; }
      .sidebar-header h2, .my-name, .search-box, .contact-name, .contact-preview, .contact-time, .logout-btn { display: none; }
      .contact-item { justify-content: center; padding: 10px 0; }
      .contact-info { display: none; }
    }
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <h1>Chat</h1>
    <p>ユーザー名とパスワードだけでOK</p>
  </div>
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchTab('login')">ログイン</div>
    <div class="auth-tab" onclick="switchTab('register')">新規登録</div>
  </div>
  <div class="auth-form">
    <input type="text" id="username" placeholder="ユーザー名（半角英数字）">
    <div class="input-hint" id="username-hint" style="display:none">4〜20文字の半角英数字・アンダースコアのみ</div>
    <input type="text" id="displayName" placeholder="表示名（ニックネーム）" style="display:none">
    <input type="password" id="password" placeholder="パスワード（6文字以上）">
    <div class="auth-error" id="auth-error"></div>
    <button onclick="submitAuth()" id="auth-btn">ログイン</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div>
          <h2>Chat</h2>
          <div class="my-name" id="my-name-display"></div>
        </div>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="ユーザーを検索..." oninput="filterContacts(this.value)">
      </div>
      <div class="contacts" id="contacts-list">
        <div style="text-align:center;padding:20px;color:#bbb;font-size:13px">読み込み中...</div>
      </div>
    </div>
    <div class="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <p>左のリストからトークを選んでください</p>
      </div>
      <div id="chat-window">
        <div class="chat-header" id="chat-header"></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <textarea id="msg-input" placeholder="メッセージを入力..." rows="1"
            oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // =============================================
  // ★ SUPABASE CONFIG - ここを書き換えてください ★
  // =============================================
  const SUPABASE_URL = 'https://orwrxfnomxjpnumhozao.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_3OaxPCGVrw6Lk42DbTScKg_TqeMvlnG';
  // =============================================

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null, currentProfile = null;
  let currentPartner = null, currentPartnerProfile = null;
  let allUsers = [], realtimeSub = null, usersSub = null;
  let lastMessages = {}, currentTab = 'login';

  const COLORS = ['#5E8DDD','#E17055','#6C5CE7','#00B894','#D63031','#0984E3','#E84393','#F39C12'];
  const getColor = str => { let h = 0; for (let c of str) h = (h*31+c.charCodeAt(0))&0xFFFFFFFF; return COLORS[Math.abs(h)%COLORS.length]; };
  const initials = name => { const w = name.trim().split(/\s+/); return (w.length>1 ? w[0][0]+w[1][0] : name.slice(0,2)).toUpperCase(); };
  const toFakeEmail = u => u.toLowerCase().trim() + '@chat.internal';

  // ── Auth UI ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='login')));
    const isReg = tab === 'register';
    document.getElementById('displayName').style.display = isReg ? '' : 'none';
    document.getElementById('username-hint').style.display = isReg ? '' : 'none';
    document.getElementById('auth-btn').textContent = isReg ? '登録する' : 'ログイン';
    document.getElementById('auth-error').textContent = '';
  }

  async function submitAuth() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('auth-btn');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = 'ユーザー名とパスワードを入力してください'; return; }

    btn.disabled = true;
    btn.textContent = '処理中...';

    try {
      if (currentTab === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email: toFakeEmail(username), password });
        if (error) throw error;
      } else {
        if (!/^[a-zA-Z0-9_]{4,20}$/.test(username)) {
          errEl.textContent = 'ユーザー名は4〜20文字の半角英数字・アンダースコアのみ';
          return;
        }
        const displayName = document.getElementById('displayName').value.trim() || username;

        // ユーザー名重複チェック
        const { data: dup } = await sb.from('profiles').select('id').eq('username', username.toLowerCase()).maybeSingle();
        if (dup) { errEl.textContent = 'このユーザー名はすでに使われています'; return; }

        const { data, error } = await sb.auth.signUp({ email: toFakeEmail(username), password });
        if (error) throw error;

        // プロフィール作成
        await sb.from('profiles').insert({
          id: data.user.id,
          username: username.toLowerCase(),
          display_name: displayName
        });
      }
    } catch (e) {
      errEl.textContent = translateError(e.message || e.code);
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'ログイン' : '登録する';
    }
  }

  function translateError(msg) {
    if (msg.includes('Invalid login')) return 'ユーザー名またはパスワードが間違っています';
    if (msg.includes('already registered')) return 'このユーザー名はすでに使われています';
    if (msg.includes('weak')) return 'パスワードは6文字以上にしてください';
    if (msg.includes('rate')) return 'しばらくしてから再試行してください';
    return 'エラーが発生しました: ' + msg;
  }

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });

  // ── Auth State ──
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      currentProfile = profile;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('my-name-display').textContent = profile?.display_name || '';
      startApp();
    } else {
      currentUser = null; currentProfile = null;
      document.getElementById('auth-screen').style.display = '';
      document.getElementById('app').style.display = 'none';
      if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
      if (usersSub) { sb.removeChannel(usersSub); usersSub = null; }
    }
  });

  async function logout() {
    if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
    currentPartner = null;
    await sb.auth.signOut();
  }

  // ── App ──
  async function startApp() {
    await loadUsers();
    // ユーザー一覧をリアルタイム更新
    usersSub = sb.channel('profiles-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, loadUsers)
      .subscribe();
  }

  async function loadUsers() {
    const { data } = await sb.from('profiles').select('*').neq('id', currentUser.id).order('display_name');
    allUsers = data || [];
    renderContacts(allUsers);
  }

  const getConvId = (a, b) => [a, b].sort().join('_');

  function renderContacts(users) {
    const list = document.getElementById('contacts-list');
    if (!users.length) {
      list.innerHTML = '<div class="empty-sidebar">まだ他のユーザーがいません。<br>友だちに登録してもらってください</div>';
      return;
    }
    list.innerHTML = users.map(u => {
      const isActive = currentPartner && currentPartner.id === u.id;
      const color = getColor(u.id);
      const preview = lastMessages[getConvId(currentUser.id, u.id)];
      return `<div class="contact-item ${isActive ? 'active' : ''}" onclick="openChat('${u.id}')">
        <div class="avatar" style="background:${color}">${initials(u.display_name)}</div>
        <div class="contact-info">
          <div class="contact-name">${esc(u.display_name)}</div>
          <div class="contact-preview">${preview ? esc(preview.content) : '@' + esc(u.username)}</div>
        </div>
        ${preview ? `<div class="contact-time">${formatTime(preview.created_at)}</div>` : ''}
      </div>`;
    }).join('');
  }

  function filterContacts(q) {
    renderContacts(allUsers.filter(u =>
      u.display_name.toLowerCase().includes(q.toLowerCase()) ||
      u.username.toLowerCase().includes(q.toLowerCase())
    ));
  }

  // ── Chat ──
  async function openChat(uid) {
    currentPartner = allUsers.find(u => u.id === uid);
    if (!currentPartner) return;
    currentPartnerProfile = currentPartner;
    renderContacts(allUsers);

    document.getElementById('chat-placeholder').style.display = 'none';
    const cw = document.getElementById('chat-window');
    cw.style.cssText = 'display:flex; flex:1; flex-direction:column; height:100%; overflow:hidden;';

    const color = getColor(currentPartner.id);
    document.getElementById('chat-header').innerHTML = `
      <div class="avatar" style="background:${color};width:38px;height:38px;font-size:13px;flex-shrink:0">${initials(currentPartner.display_name)}</div>
      <div>
        <div class="chat-partner-name">${esc(currentPartner.display_name)}</div>
        <div style="font-size:11px;color:#aaa">@${esc(currentPartner.username)}</div>
      </div>`;

    // 既存メッセージ取得
    const convId = getConvId(currentUser.id, currentPartner.id);
    const { data: msgs } = await sb.from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('created_at');
    renderMessages(msgs || []);
    if (msgs?.length) {
      lastMessages[convId] = msgs[msgs.length - 1];
      renderContacts(allUsers);
    }

    // リアルタイム購読を切り替え
    if (realtimeSub) sb.removeChannel(realtimeSub);
    realtimeSub = sb.channel('messages-' + convId)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `conversation_id=eq.${convId}`
      }, payload => {
        appendMessage(payload.new);
        lastMessages[convId] = payload.new;
        renderContacts(allUsers);
      })
      .subscribe();

    document.getElementById('msg-input').focus();
  }

  function renderMessages(msgs) {
    const c = document.getElementById('messages');
    if (!msgs.length) {
      c.innerHTML = '<div style="text-align:center;color:#bbb;font-size:13px;padding:20px">まだメッセージはありません</div>';
      return;
    }
    c.innerHTML = '';
    let lastDate = '';
    msgs.forEach((msg, i) => {
      const isMine = msg.sender_id === currentUser.id;
      const dateStr = new Date(msg.created_at).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
      if (dateStr !== lastDate) {
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.textContent = dateStr;
        c.appendChild(div);
        lastDate = dateStr;
      }
      const showName = !isMine && (!msgs[i-1] || msgs[i-1].sender_id !== msg.sender_id);
      c.appendChild(buildMsgEl(msg, isMine, showName));
    });
    c.scrollTop = c.scrollHeight;
  }

  function appendMessage(msg) {
    const c = document.getElementById('messages');
    const isEmpty = c.querySelector('[style*="まだメッセージ"]');
    if (isEmpty) c.innerHTML = '';
    const isMine = msg.sender_id === currentUser.id;
    c.appendChild(buildMsgEl(msg, isMine, false));
    c.scrollTop = c.scrollHeight;
  }

  function buildMsgEl(msg, isMine, showName) {
    const ts = new Date(msg.created_at);
    const timeStr = ts.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
    const color = getColor(msg.sender_id);
    const senderName = isMine ? currentProfile.display_name : currentPartner.display_name;

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    row.innerHTML = `
      <div class="msg-avatar" style="background:${color}">${initials(senderName)}</div>
      <div style="display:flex;flex-direction:column;${isMine?'align-items:flex-end':''}">
        ${showName ? `<div class="msg-name">${esc(senderName)}</div>` : ''}
        <div style="display:flex;align-items:flex-end;gap:6px;${isMine?'flex-direction:row-reverse':''}">
          <div class="msg-bubble">${esc(msg.content)}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      </div>`;
    return row;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentPartner) return;
    input.value = ''; input.style.height = '';

    await sb.from('messages').insert({
      conversation_id: getConvId(currentUser.id, currentPartner.id),
      sender_id: currentUser.id,
      receiver_id: currentPartner.id,
      content: text
    });
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts), diff = Date.now() - d;
    if (diff < 60000) return 'たった今';
    if (diff < 3600000) return Math.floor(diff/60000) + '分前';
    if (diff < 86400000) return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
